gateway:
  replicas: 1
  image: quickticket-gateway:v1
  timeoutMs: 5000

events:
  replicas: 1
  image: quickticket-events:v1
  db:
    host: postgres
    port: 5432
    name: quickticket
    user: quickticket
    password: quickticket
    maxConns: 10
  redis:
    host: redis
    port: 6379
    timeoutMs: 1000
  reservationTtl: 300

payments:
  replicas: 1
  image: quickticket-payments:v1
  failureRate: "0.0"
  latencyMs: 0

postgres:
  image: postgres:17-alpine
  db: quickticket
  user: quickticket
  password: quickticket

redis:
  image: redis:7-alpine

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

probes:
  liveness:
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 2
